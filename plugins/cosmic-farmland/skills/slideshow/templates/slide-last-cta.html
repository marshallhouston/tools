<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Slide Last -- CTA</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <section class="slide">
    <header class="brand-header">
      <div class="brand-logo-fallback">cosmic-farmland</div>
      <div class="brand-rule"></div>
    </header>

    <div class="slide-main">
      <div class="kicker">{{KICKER}}</div>
      <h2 class="cta-line">{{CTA_LINE}}</h2>
      <p class="cta-action">{{CTA_ACTION}}</p>
      <div class="cta-handle">{{HANDLE}}</div>
    </div>

    <div class="brand-watermark"></div>
  </section>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Content -- Code</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <section class="slide">
    <header class="brand-header">
      <div class="brand-logo-fallback">cosmic-farmland</div>
      <div class="brand-rule"></div>
    </header>

    <div class="slide-main top">
      <div class="kicker">{{KICKER}}</div>
      <h2 class="subhead">{{HEADLINE}}</h2>
      <!-- Optional hand-tokenization: wrap tokens in <span class="keyword|string|comment">…</span>
           for color. Plain text renders monochrome. -->
      <pre class="code-block"><code>{{CODE}}</code></pre>
    </div>

    <div class="brand-watermark"></div>
  </section>
</body>
</html>

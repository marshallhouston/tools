<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Content -- Terminal</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <section class="slide">
    <header class="brand-header">
      <div class="brand-logo-fallback">cosmic-farmland</div>
      <div class="brand-rule"></div>
    </header>

    <div class="slide-main top">
      <div class="kicker">{{KICKER}}</div>
      <h2 class="subhead">{{HEADLINE}}</h2>
      <div class="terminal">
        <div class="terminal-bar">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="terminal-body"><span class="prompt">$ </span><span class="command">{{COMMAND}}</span>
<span class="output">{{OUTPUT}}</span></div>
      </div>
    </div>

    <div class="brand-watermark"></div>
  </section>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Content -- Numbered</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>
  <section class="slide">
    <header class="brand-header">
      <div class="brand-logo-fallback">cosmic-farmland</div>
      <div class="brand-rule"></div>
    </header>

    <div class="slide-main top">
      <div class="kicker">{{KICKER}}</div>
      <h2 class="subhead">{{HEADLINE}}</h2>
      <ol class="steps">
        <li>
          <div class="step-body">
            <span class="step-title">{{STEP_1_TITLE}}</span>
            {{STEP_1_BODY}}
          </div>
        </li>
        <li>
          <div class="step-body">
            <span class="step-title">{{STEP_2_TITLE}}</span>
            {{STEP_2_BODY}}
          </div>
        </li>
        <li>
          <div class="step-body">
            <span class="step-title">{{STEP_3_TITLE}}</span>
            {{STEP_3_BODY}}
          </div>
        </li>
      </ol>
    </div>

    <div class="brand-watermark"></div>
  </section>
</body>
</html>

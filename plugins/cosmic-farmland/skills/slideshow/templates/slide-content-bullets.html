<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Content -- Bullets</title>

</head>
<body>
  <section class="slide">
    <header class="brand-header">
      <div class="brand-logo-fallback">cosmic-farmland</div>
      <div class="brand-rule"></div>
    </header>

    <div class="slide-main top">
      <div class="kicker">{{KICKER}}</div>
      <h2 class="subhead">{{HEADLINE}}</h2>
      <!-- 3-5 bullets. Delete extra <li> rows if you have fewer. -->

        <li>{{BULLET_1}}</li>
        <li>{{BULLET_2}}</li>
        <li>{{BULLET_3}}</li>
        <li>{{BULLET_4}}</li>
        <li>{{BULLET_5}}</li>
      </ul>
    </div>

    <div class="brand-watermark"></div>
  </section>
</body>
</html>
